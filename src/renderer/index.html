<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <title>轻记</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app">
    <!-- ========== 左栏：文件夹 ========== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <span class="app-name">轻记</span>
        <button class="icon-btn" id="newFolderBtn" title="新建文件夹">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M3 7a2 2 0 0 1 2-2h3.2a2 2 0 0 1 1.4.6L11 7h6a2 2 0 0 1 2 2v1" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 9h13.5a2 2 0 0 1 2 2.2l-.6 6A2 2 0 0 1 15.9 19H5.1a2 2 0 0 1-2-1.8L2.5 11" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M19 14v4M17 16h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </button>
      </div>
      <nav class="folder-list" id="folderList"></nav>
      <div class="sidebar-bottom">
        <button class="theme-btn" id="themeBtn" title="切换深色模式">
          <svg class="ico-moon" viewBox="0 0 24 24" width="16" height="16"><path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
          <span id="themeLabel">深色模式</span>
        </button>
      </div>
    </aside>

    <!-- ========== 中栏：笔记列表 ========== -->
    <section class="list-pane" id="listPane">
      <div class="list-header">
        <div class="lh-left">
          <button class="icon-btn sidebar-toggle" id="sidebarToggle" title="显示 / 隐藏边栏 (Ctrl/Cmd+\)">
            <svg viewBox="0 0 24 24" width="18" height="18"><rect x="3" y="4.5" width="18" height="15" rx="2.6" fill="none" stroke="currentColor" stroke-width="1.7"/><line x1="9.3" y1="4.5" x2="9.3" y2="19.5" stroke="currentColor" stroke-width="1.7"/></svg>
          </button>
          <div class="list-title" id="listTitle">所有备忘录</div>
        </div>
        <button class="icon-btn new-note-btn" id="newNoteBtn" title="新建备忘录 (Ctrl/Cmd+N)">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M15.5 4.5l4 4M4 20l1-4 11-11 4 4-11 11-4 1z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <div class="search-wrap">
        <svg class="search-ico" viewBox="0 0 24 24" width="15" height="15"><circle cx="11" cy="11" r="6.5" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M16 16l4.5 4.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
        <input type="text" id="searchInput" class="search-input" placeholder="搜索" />
        <button class="search-clear" id="searchClear" title="清除">×</button>
      </div>
      <div class="note-list" id="noteList"></div>
    </section>

    <!-- ========== 右栏：编辑器 ========== -->
    <main class="editor-pane" id="editorPane">
      <div class="editor-toolbar" id="toolbar">
        <div class="tb-group">
          <button class="tb-btn" data-cmd="format" title="文字样式">
            <span class="aa">Aa</span>
            <svg viewBox="0 0 24 24" width="10" height="10" class="chev"><path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="tb-btn" data-cmd="checklist" title="清单">
            <svg viewBox="0 0 24 24" width="18" height="18"><rect x="3" y="4.5" width="6" height="6" rx="1.6" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M4.5 7.5l1.5 1.5 2.2-2.6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><rect x="3" y="13.5" width="6" height="6" rx="1.6" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M12 7.5h9M12 16.5h9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          </button>
          <button class="tb-btn" data-cmd="bullet" title="项目符号列表">
            <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="5" cy="7" r="1.6" fill="currentColor"/><circle cx="5" cy="16.5" r="1.6" fill="currentColor"/><path d="M10 7h11M10 16.5h11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="tb-sep"></div>
        <div class="tb-group">
          <button class="tb-btn tb-b" data-cmd="bold" title="加粗"><b>B</b></button>
          <button class="tb-btn tb-i" data-cmd="italic" title="斜体"><i>I</i></button>
          <button class="tb-btn tb-u" data-cmd="underline" title="下划线"><u>U</u></button>
          <button class="tb-btn tb-s" data-cmd="strike" title="删除线"><s>S</s></button>
        </div>
        <div class="tb-sep"></div>
        <div class="tb-group">
          <button class="tb-btn" data-cmd="image" title="插入图片">
            <svg viewBox="0 0 24 24" width="18" height="18"><rect x="3" y="5" width="18" height="14" rx="2.2" fill="none" stroke="currentColor" stroke-width="1.6"/><circle cx="8.5" cy="10" r="1.7" fill="currentColor"/><path d="M4 17l4.5-4.5 3.5 3 3-2.5L20 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
        <div class="tb-spacer"></div>
        <div class="tb-group">
          <button class="tb-btn" data-cmd="pin" id="pinBtn" title="置顶">
            <svg viewBox="0 0 24 24" width="18" height="18"><path d="M9 3h6l-1 5 3 3v2h-5v6l-1 1-1-1v-6H4v-2l3-3z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
          </button>
          <button class="tb-btn" data-cmd="delete" id="deleteBtn" title="删除">
            <svg viewBox="0 0 24 24" width="18" height="18"><path d="M4 7h16M9 7V4.8A1.8 1.8 0 0 1 10.8 3h2.4A1.8 1.8 0 0 1 15 4.8V7M6 7l1 12.2A1.8 1.8 0 0 0 8.8 21h6.4a1.8 1.8 0 0 0 1.8-1.8L18 7" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>

        <!-- 文字样式弹出面板 -->
        <div class="popover" id="formatPopover" hidden>
          <button class="pop-item" data-style="title"><span class="s-title">标题</span></button>
          <button class="pop-item" data-style="heading"><span class="s-heading">大标题</span></button>
          <button class="pop-item" data-style="subheading"><span class="s-subheading">小标题</span></button>
          <button class="pop-item" data-style="body"><span class="s-body">正文</span></button>
          <div class="pop-sep"></div>
          <button class="pop-item" data-style="numbered"><span class="s-body">编号列表 1.</span></button>
        </div>
      </div>

      <div class="editor-scroll" id="editorScroll">
        <div class="editor" id="editor" contenteditable="true" spellcheck="true"></div>
      </div>

      <!-- 未选中任何笔记时的占位 -->
      <div class="editor-empty" id="editorEmpty">
        <svg viewBox="0 0 24 24" width="52" height="52"><path d="M6 3h8l4 4v14a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><path d="M14 3v4h4M8 12h8M8 16h5" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        <p>选择或新建一条备忘录</p>
      </div>
    </main>
  </div>

  <!-- 隐藏的文件选择器，用于插入图片 -->
  <input type="file" id="imageInput" accept="image/*" hidden multiple />

  <!-- 右键菜单 -->
  <div class="context-menu" id="contextMenu" hidden></div>

  <!-- 轻提示 -->
  <div class="toast" id="toast" hidden></div>

  <script src="storage.js"></script>
  <script src="editor.js"></script>
  <script src="app.js"></script>
</body>
</html>
